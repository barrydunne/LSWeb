name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build + test + coverage)
    runs-on: ubuntu-latest
    env:
      # The integration tests self-provision a LocalStack container via Testcontainers.
      # Disable the Ryuk reaper, whose callback connection cannot be established under
      # Docker-out-of-Docker CI runners; the test fixture removes its own container in
      # DisposeAsync and the runner is ephemeral, so cleanup is already guaranteed.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/LocalStackWeb.slnx

      - name: Build
        run: dotnet build src/LocalStackWeb.slnx -c Release --no-restore

      - name: Unit tests (100% line+branch gate)
        run: >
          dotnet test src/tests/Foundation.UnitTests/Foundation.UnitTests.csproj
          -c Release --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=100
          /p:ThresholdType=line%2cbranch
          /p:ThresholdStat=total

      - name: Integration tests
        run: dotnet test src/tests/Foundation.IntegrationTests/Foundation.IntegrationTests.csproj -c Release --no-build

  web:
    name: Web (lint + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run coverage

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [backend, web]
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build --file docker/Dockerfile --tag lsweb:ci .

  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: [backend, web, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version metadata
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/lsweb" >> "$GITHUB_OUTPUT"
          echo "version=$(date -u +'%Y.%m%d.%H%M')" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Create git tag
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes